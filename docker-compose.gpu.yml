# GPU override — use on servers with NVIDIA GPU + nvidia-container-toolkit:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
