<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DAB Meetings Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #111223;
      color: #e4e5f1;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #252640;
    }
    .header h1 { font-size: 14px; font-weight: 700; color: #c4b5fd; }
    .header p { font-size: 11px; color: #6b6f8e; margin-top: 2px; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    label { display: block; font-size: 11px; color: #8b8fa8; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 7px 10px;
      background: #1a1d35;
      border: 1px solid #2f3158;
      border-radius: 8px;
      color: #e4e5f1;
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: #6d28d9; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    button {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #4f46e5; color: white; width: 100%; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #2d2780; color: #6b6f8e; cursor: not-allowed; }
    .status {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: #052e16; color: #86efac; border: 1px solid #16a34a; }
    .status.error { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
    .status.info { background: #1e1b4b; color: #c7d2fe; border: 1px solid #4338ca; }
    .divider { border: none; border-top: 1px solid #252640; }
    .hint { font-size: 10px; color: #4a4d6a; }
    .recording-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #450a0a;
      border: 1px solid #dc2626;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 11px;
      font-weight: 500;
    }
    .recording-indicator.show { display: flex; }
    .rec-dot {
      width: 8px; height: 8px;
      background: #dc2626;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>DAB Meetings Recorder</h1>
    <p>Record Google Meet &amp; Teams calls</p>
  </div>
  <div class="body">
    <div id="recording-indicator" class="recording-indicator">
      <div class="rec-dot"></div>
      <span id="rec-label">Recording…</span>
    </div>

    <div>
      <label>DAB Meetings Server URL</label>
      <input id="serverUrl" type="url" placeholder="https://your-server.example.com" />
    </div>
    <div>
      <label>Extension API Key</label>
      <div class="row">
        <input id="apiKey" type="password" placeholder="Paste key from Settings page" />
        <button id="toggleKey" style="background:#1a1d35;border:1px solid #2f3158;color:#8b8fa8;padding:7px 10px;border-radius:8px;font-size:11px;cursor:pointer;white-space:nowrap;">Show</button>
      </div>
    </div>
    <button id="saveBtn" class="btn-primary">Save Settings</button>
    <div id="status" class="status"></div>

    <hr class="divider" />
    <p class="hint">Navigate to a Google Meet or Teams meeting page, then click the "Record" button that appears in the bottom-right corner.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
