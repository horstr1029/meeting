# Server-specific overrides for 192.168.104.35
# Applied automatically by docker compose

services:
  app:
    ports:
      - "3000:3000"

  db:
    ports:
      - "5434:5432"   # 5432 and 5433 are taken by other apps

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest   # CPU image (no GPU override needed separately)
    deploy:
      resources: {}   # Remove GPU requirement

  # Ollama already running at 172.17.0.1:11211 — no container needed
  ollama:
    profiles: ["disabled"]

  # Cloudflare tunnel handles SSL — no nginx needed
  nginx:
    profiles: ["disabled"]
